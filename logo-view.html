<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORFO Studio Logo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #080808;
            color: #f6f2ec;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo-container {
            text-align: center;
            position: relative;
        }
        .logo-image {
            max-width: 100%;
            max-height: 80vh;
            width: auto;
            height: auto;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #c9a87c;
            color: #080808;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s ease;
        }
        .close-btn:hover {
            background: #b8956c;
        }
        .logo-title {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #c9a87c;
            font-family: 'Cormorant Garamond', serif;
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.close()">×</button>
    <div class="logo-container">
        <img src="Logo.png" alt="FORFO Hair & Makeup Studios" class="logo-image">
        <h1 class="logo-title">FORFO Studio Logo</h1>
    </div>
</body>
</html>
